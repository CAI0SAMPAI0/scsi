{% extends "base_auth.html" %}

{% block title %}Recuperar Senha{% endblock %}

{% block auth_content %}
<h5 class="fw-bold mb-1">Recuperar senha</h5>
<p class="text-muted small mb-4">Informe seu e-mail e enviaremos instruções para redefinir sua senha.</p>

<form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-4">
        <label class="form-label fw-medium">E-mail cadastrado</label>
        {{ form.email }}
    </div>
    <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg fw-semibold" id="btn-reset">
            <i class="feather-mail me-2"></i>Enviar instruções
        </button>
    </div>
</form>
<p class="text-center text-muted small mb-0">
    Lembrou a senha? <a href="{% url 'accounts:login' %}" class="text-primary text-decoration-none">Voltar ao login</a>
</p>
{% endblock %}
