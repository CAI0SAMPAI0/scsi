{% extends "base_auth.html" %}

{% block title %}E-mail Enviado{% endblock %}

{% block auth_content %}
<div class="text-center">
    <i class="feather-mail text-success" style="font-size:3rem;"></i>
    <h5 class="fw-bold mt-3 mb-2">Verifique sua caixa de entrada</h5>
    <p class="text-muted small mb-4">
        Enviamos instruções para redefinir sua senha. Verifique sua caixa de entrada e também a pasta de spam.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary fw-semibold" id="btn-back-login">
        <i class="feather-arrow-left me-2"></i>Voltar ao login
    </a>
</div>
{% endblock %}
