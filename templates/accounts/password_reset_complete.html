{% extends "base_auth.html" %}

{% block title %}Senha Redefinida{% endblock %}

{% block auth_content %}
<div class="text-center">
    <i class="feather-check-circle text-success" style="font-size:3rem;"></i>
    <h5 class="fw-bold mt-3 mb-2">Senha redefinida com sucesso!</h5>
    <p class="text-muted small mb-4">
        Sua senha foi alterada. Faça login com a nova senha.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary fw-semibold" id="btn-login-now">
        <i class="feather-log-in me-2"></i>Fazer login
    </a>
</div>
{% endblock %}
