{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SCSI – Sistema de Gestão para Corretora de Seguros Inteligente">
    <link rel="icon" href="{% static 'images/logo_scsi.png' %}" type="image/png">
    <title>{% block title %}SCSI{% endblock %} | SCSI</title>
    <!-- Bootstrap CSS (Duralux) -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <!-- Vendors CSS -->
    <link rel="stylesheet" href="{% static 'css/vendors.min.css' %}">
    <!-- Duralux Theme -->
    <link rel="stylesheet" href="{% static 'css/theme.min.css' %}">
    <!-- SCSI Custom tokens -->
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

<!-- Vendors JS -->
<script src="{% static 'js/vendors.min.js' %}"></script>
<!-- Feather Icons (replaces <i data-feather="..."> with inline SVG) -->
<script src="https://unpkg.com/feather-icons@4.29.1/dist/feather.min.js"></script>
<script>
document.querySelectorAll('i[class*="feather-"]').forEach(function(el){
    var m = el.className.match(/feather-([a-z0-9-]+)/);
    if (m && feather.icons[m[1]]) {
        el.setAttribute('data-feather', m[1]);
        el.classList.remove('feather-' + m[1]);
        var fs = el.style.fontSize;
        if (fs) {
            el.style.fontSize = '';
            el.style.width = fs;
            el.style.height = fs;
        }
    }
});
feather.replace();
</script>
<!-- SCSI App JS -->
<script src="{% static 'js/app.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
