name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy-to-huggingface:
    name: Sync to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Garante que arquivos grandes sejam baixados

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Inicializa o Git LFS
          git lfs install
          
          # 2. Configura o gerenciador de credenciais para salvar o Token de forma segura
          git config --global credential.helper store
          echo "https://SUPERCAI0:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # 3. Adiciona o repositório remoto do Space (sem expor o token na URL)
          git remote add hf https://huggingface.co/spaces/SUPERCAI0/scsi
          
          # 4. Faz o push forçado (o Git e o LFS vão usar a credencial salva acima)
          git push --force hf main