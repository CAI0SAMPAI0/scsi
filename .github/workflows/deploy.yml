name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy-to-huggingface:
    name: Sync to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # Baixa os arquivos do LFS se houver

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Inicializa o Git LFS
          git lfs install
          
          # 2. Injeta o token diretamente no cabeçalho de autorização para o domínio do Hugging Face
          # Isso resolve o problema do Git LFS perder a autenticação
          git config --global http.https://huggingface.co/.extraheader "Authorization: Bearer $HF_TOKEN"
          
          # 3. Adiciona o repositório remoto de forma limpa
          git remote add hf https://huggingface.co/spaces/SUPERCAI0/scsi
          
          # 4. Envia os arquivos
          git push --force hf main